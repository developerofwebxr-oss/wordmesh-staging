/* ============================================================
   VR controller polling (best-effort — see status log)
   + controller-laser select (trigger, buttons[0]) — bound the same on
   both hands per the webxr-threejs standard, so no handedness check is
   needed for selection. Controller ray objects are parented to `rig`
   (matching `camera`'s own parenting) so their matrixWorld composes
   correctly against nodeMesh, a direct child of `scene`. Feeds the SAME
   raycaster + selectFromRay() as mouse/tap — one selection path.
   ============================================================ */
let flyClickPrev = false;
let snapCooldown = 0;
const controllerRays = [renderer.xr.getController(0), renderer.xr.getController(1)];
controllerRays.forEach((c) => rig.add(c));
const triggerPrev = [false, false];
const _ctrlDir = new THREE.Vector3();
function pollVRControllers(session) {
  let moveX = 0, moveY = 0, turnX = 0;
  for (let i = 0; i < session.inputSources.length; i++) {
    const src = session.inputSources[i];
    if (!src.gamepad) continue;
    const gp = src.gamepad;
    if (src.handedness === "left") {
      moveX = gp.axes[2] || 0;
      moveY = gp.axes[3] || 0;
    } else if (src.handedness === "right") {
      turnX = gp.axes[2] || 0;
      const clicked = !!(gp.buttons[3] && gp.buttons[3].pressed);
      if (clicked && !flyClickPrev) btnFly.click();
      flyClickPrev = clicked;
    }
    const triggerPressed = !!(gp.buttons[0] && gp.buttons[0].pressed);
    if (triggerPressed && !triggerPrev[i] && i < controllerRays.length) {
      const ctrl = controllerRays[i];
      raycaster.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
      _ctrlDir.set(0, 0, -1).transformDirection(ctrl.matrixWorld);
      raycaster.ray.direction.copy(_ctrlDir);
      handleSelectRay();
    }
    triggerPrev[i] = triggerPressed;
  }
  return { moveX, moveY, turnX };
}

/* ============================================================
   Main loop — no per-frame allocations beyond reused temporaries
   ============================================================ */
const _fwd = new THREE.Vector3();
const _right = new THREE.Vector3();
const _flat = new THREE.Vector3();
const velocity = new THREE.Vector3();   // current smoothed velocity (units/sec), reused every frame
const _targetVel = new THREE.Vector3(); // scratch, reused every frame
const _labelOffset = new THREE.Vector3(); // scratch, reused every frame
const _occDir = new THREE.Vector3(), _occToOther = new THREE.Vector3();
// A label is anchored above its own node, so when that node sits behind a
// nearer sphere the word still clears the blocker's silhouette and appears to
// belong to it — tap that sphere and you get a different token's card. Hide a
// label when another node blocks the line of sight to its own. This also kills
// the cluster of stacked micro-labels seen standing next to a large sphere:
// they belong to nodes hidden behind it. Analytic ray-vs-sphere over the node
// list (~21 labels x ~51 nodes/frame), not a raycast against the 220-instance
// mesh, which would be ~150k triangle tests per label.
function labelOccluded(n, camPos) {
  _occDir.copy(n.pos).sub(camPos);
  const distToNode = _occDir.length();
  if (distToNode < 1e-3) return false;
  _occDir.divideScalar(distToNode);
  const ownR = n.scale * 0.55;
  for (const m of nodeData) {
    if (!m.alive || m.index === n.index) continue;
    const blockR = m.scale * 0.55;
    _occToOther.copy(m.pos).sub(camPos);
    const along = _occToOther.dot(_occDir);
    // blocker's centre must lie between the camera and our node's centre
    if (along <= 0 || along >= distToNode) continue;
    const perpSq = _occToOther.lengthSq() - along * along;
    // Exactly the sphere the pick ray would hit: any tolerance here (an
    // earlier 0.9r "ignore grazing edges") leaves a band where the blocker
    // still covers our node's centre pixel, so the label stays up while a tap
    // through it selects the blocker — the wrong-card-for-the-word symptom.
    if (perpSq < blockR * blockR) return true;
  }
  return false;
}
const clock = new THREE.Clock();
let edgeRebuildAccum = 0;
let lastHoverCheck = 0;

// Tuned for "glide through a constellation": fast enough to cross the ~120-unit
// field in well under a minute, smoothed so input reads as momentum rather than
// an instant on/off snap.
const MOVE_SPEED = 5.0;
const SPRINT_SPEED = 11.0;
const VR_MOVE_SPEED = 3.6;   // gentler in-headset per XR comfort norms
const VR_SPRINT_SPEED = 7.5;
const STICK_DEADZONE = 0.12;
const VELOCITY_SMOOTH_TIME = 0.15; // seconds; lower = snappier, higher = floatier
const SELECTED_FLARE_LEVEL = 0.5; // sustained node highlight while its panel is open

renderer.setAnimationLoop((time, frame) => {
  const dt = Math.min(0.05, clock.getDelta());
  const smooth = 1 - Math.exp(-dt / VELOCITY_SMOOTH_TIME); // frame-rate-independent damping factor

  // Teleport (search-result quick-fly) takes over movement
  // entirely for its short duration — gates both the VR and flat movement
  // branches below rather than fighting them for rig.position.
  if (teleportAnim) {
    teleportAnim.t += dt / TELEPORT_DURATION;
    const raw = Math.min(1, teleportAnim.t);
    const eased = raw < 0.5 ? 4 * raw * raw * raw : 1 - Math.pow(-2 * raw + 2, 3) / 2; // easeInOutCubic
    rig.position.lerpVectors(teleportAnim.from, teleportAnim.to, eased);
    // turn to face the node as we fly (flat-mode look; in XR the device pose
    // owns orientation, so these are simply unused there). yaw covers behind-us
    // targets, pitch covers far-above/below ones.
    yaw = teleportAnim.fromYaw + (teleportAnim.toYaw - teleportAnim.fromYaw) * eased;
    pitch = teleportAnim.fromPitch + (teleportAnim.toPitch - teleportAnim.fromPitch) * eased;
    if (raw >= 1) {
      selectNode(teleportAnim.node);
      teleportAnim = null;
    }
  } else if (renderer.xr.isPresenting && frame) {
    const session = renderer.xr.getSession();
    const { moveX, moveY, turnX } = pollVRControllers(session);
    snapCooldown -= dt;
    if (Math.abs(turnX) > 0.65 && snapCooldown <= 0) {
      rig.rotation.y -= Math.sign(turnX) * (Math.PI / 6); // 30° snap-turn
      snapCooldown = 0.35;
    }
    camera.getWorldDirection(_fwd);
    if (!flyMode) _fwd.y = 0;
    _fwd.normalize();
    _right.crossVectors(_fwd, camera.up).normalize();

    let mx = moveX, my = -moveY;
    // Handheld AR (phone) has no gamepad, so pollVRControllers returns nothing
    // and the rig never moved — only node-tapping worked. The on-screen
    // joystick + vertical buttons (rendered in the AR dom-overlay, outside
    // #hud) must drive locomotion here too, exactly as in Screen mode. In
    // Quest VR the touch joystick is idle (joyVec 0), so this is additive and
    // harmless there. Movement is camera-relative via _fwd/_right (the device
    // pose), so pushing the stick forward flies where the phone is pointing.
    const jmag = Math.hypot(joyVec.x, joyVec.y);
    if (jmag > STICK_DEADZONE) {
      const t = Math.min(1, (jmag - STICK_DEADZONE) / (1 - STICK_DEADZONE));
      const eased = (t * t) / jmag;
      mx += joyVec.x * eased;
      my -= joyVec.y * eased;
    }
    const mlen = Math.hypot(mx, my);
    if (mlen > 1) { mx /= mlen; my /= mlen; }
    let vy = 0;
    if (flyMode) vy = Math.max(-1, Math.min(1, mobileVertical));
    const speed = (mlen > 0.85 || jmag > 0.9) ? VR_SPRINT_SPEED : VR_MOVE_SPEED;
    _targetVel.set(0, 0, 0).addScaledVector(_fwd, my * speed).addScaledVector(_right, mx * speed);
    _targetVel.y += vy * speed;
    velocity.lerp(_targetVel, smooth);
    rig.position.addScaledVector(velocity, dt);
  } else {
    camera.rotation.set(pitch, yaw, 0, "YXZ");
    _fwd.set(0, 0, -1).applyEuler(camera.rotation);
    if (!flyMode) _fwd.y = 0;
    _fwd.normalize();
    _right.crossVectors(_fwd, camera.up).normalize();

    let mx = 0, my = 0;
    if (keys.has("KeyW") || keys.has("ArrowUp")) my += 1;
    if (keys.has("KeyS") || keys.has("ArrowDown")) my -= 1;
    if (keys.has("KeyD") || keys.has("ArrowRight")) mx += 1;
    if (keys.has("KeyA") || keys.has("ArrowLeft")) mx -= 1;

    // analog stick: deadzone + quadratic ease-in, applied radially (not per-axis)
    // so diagonal deflection isn't distorted
    const jmag = Math.hypot(joyVec.x, joyVec.y);
    if (jmag > STICK_DEADZONE) {
      const t = Math.min(1, (jmag - STICK_DEADZONE) / (1 - STICK_DEADZONE));
      const eased = (t * t) / jmag;
      mx += joyVec.x * eased;
      my -= joyVec.y * eased;
    }
    // clamp combined input to unit magnitude — digital WASD diagonals used to
    // move at sqrt(2)x speed since forward+strafe were added independently
    const mlen = Math.hypot(mx, my);
    if (mlen > 1) { mx /= mlen; my /= mlen; }

    let vy = 0;
    if (flyMode) {
      if (keys.has("Space")) vy += 1;
      if (keys.has("ControlLeft") || keys.has("ControlRight")) vy -= 1;
      vy += mobileVertical;
    }
    vy = Math.max(-1, Math.min(1, vy));

    const sprint = keys.has("ShiftLeft") || keys.has("ShiftRight") || jmag > 0.9;
    const speed = sprint ? SPRINT_SPEED : MOVE_SPEED;

    _targetVel.set(0, 0, 0)
      .addScaledVector(_fwd, my * speed)
      .addScaledVector(_right, mx * speed);
    _targetVel.y += vy * speed;

    velocity.lerp(_targetVel, smooth);
    rig.position.addScaledVector(velocity, dt);
    applyFlatEyeHeight();
  }

  // node flare decay + spawn/despawn animation
  for (const n of nodeData) {
    if (n.flare > 0) n.flare = Math.max(0, n.flare - dt * 1.6);
    if (n.birth > 0) n.birth = Math.max(0, n.birth - dt / BIRTH_DURATION);
    // panel selection highlight: brightness/shine only, via the existing
    // flare mechanic (which only ever scales baseColor, never re-hues it)
    // — never a colour change, per the task's explicit guardrail
    if (n.index === selectedNodeIndex) n.flare = Math.max(n.flare, SELECTED_FLARE_LEVEL);
    if (n.dying) {
      n.dieT += dt;
      n.spawnT = Math.max(0, 1 - n.dieT / 1.5);
      if (n.dieT >= 1.5) {
        n.alive = false; n.dying = false;
        buildEdges();
        setTimeout(() => { reviveSlot(n); }, 3000 + Math.random() * 1500);
      }
    } else if (n.spawnT < 1) {
      n.spawnT = Math.min(1, n.spawnT + dt * 0.8);
      if (n.spawnT >= 1 && !n._edgesBuilt) { n._edgesBuilt = true; buildEdges(); }
    }
    if (n.alive && n.spawnT < 1 && n.dieT === 0) n._edgesBuilt = false;
  }

  // LOD: tag far nodes so refreshInstances() hides their sphere and only
  // the point-sprite stand-in (below) renders for them
  let farCount = 0;
  const camPos = rig.position;
  for (const n of nodeData) {
    if (!n.alive) { n.isFar = false; continue; }
    const d = camPos.distanceTo(n.pos);
    n.isFar = d > LOD_DIST;
    if (n.isFar) {
      farPositions[farCount*3] = n.pos.x; farPositions[farCount*3+1] = n.pos.y; farPositions[farCount*3+2] = n.pos.z;
      const farMult = Math.min(0.9, n.intensity * 0.4);
      farColors[farCount*3] = n.baseColor.r * farMult;
      farColors[farCount*3+1] = n.baseColor.g * farMult;
      farColors[farCount*3+2] = n.baseColor.b * farMult;
      farCount++;
    }
  }
  farGeo.setDrawRange(0, farCount);
  farGeo.attributes.position.needsUpdate = true;
  farGeo.attributes.color.needsUpdate = true;

  refreshInstances();

  // pulses
  let pulseInstanceCount = 0;
  for (const p of pulses) {
    if (!p.active) continue;
    p.t += dt * p.speed;
    if (p.t >= 1) { p.active = false; continue; }
    const a = nodeData[p.from].pos, b = nodeData[p.to].pos;
    _pv.lerpVectors(a, b, p.t);
    tmpObj.position.copy(_pv);
    const s = p.replay ? 0.16 : 0.24;
    tmpObj.scale.setScalar(s);
    tmpObj.rotation.set(0,0,0);
    tmpObj.updateMatrix();
    pulseMesh.setMatrixAt(pulseInstanceCount, tmpObj.matrix);
    pulseMesh.setColorAt(pulseInstanceCount, p.color);
    pulseInstanceCount++;
  }
  for (let i = pulseInstanceCount; i < MAX_PULSES; i++) {
    tmpObj.position.set(0, -9999, 0);
    tmpObj.scale.setScalar(0.0001);
    tmpObj.updateMatrix();
    pulseMesh.setMatrixAt(i, tmpObj.matrix);
  }
  pulseMesh.instanceMatrix.needsUpdate = true;
  if (pulseMesh.instanceColor) pulseMesh.instanceColor.needsUpdate = true;

  // throttled hover raycast — desktop-only (mouseNDC stays off-screen on
  // touch), cheap against ~200 instances but no need to run every frame
  if (time - lastHoverCheck > 90) {
    lastHoverCheck = time;
    raycaster.setFromCamera(mouseNDC, camera);
    const hit = raycaster.intersectObject(nodeMesh)[0];
    const idx = (hit && hit.instanceId != null && nodeData[hit.instanceId] && nodeData[hit.instanceId].alive) ? hit.instanceId : -1;
    // hover only promotes the node's label (via hoveredNodeIndex in the label
    // ranking); it no longer writes a DOM readout — selection drives the panel
    if (idx !== hoveredNodeIndex) {
      hoveredNodeIndex = idx;
    }
  }

  // in-scene detail panel: billboard, periodic content refresh, leader
  // line, auto-close if the open node died
  updatePanel(time);
  if (searchOpen) billboardYAxis(searchGroup);

  // Fix 1/2: labels — top-K + hover/select pool (recomputed periodically),
  // repositioned/rescaled/faded every frame, screen-space overlap resolved
  // in priority order, tethered to their node with a leader line.
  updateVisibleLabels(time);
  const screenW = canvas.clientWidth || window.innerWidth;
  const screenH = canvas.clientHeight || window.innerHeight;
  _labelRight.setFromMatrixColumn(camera.matrixWorld, 0).normalize();
  _labelUp.setFromMatrixColumn(camera.matrixWorld, 1).normalize();
  camera.getWorldPosition(_labelCamPos);
  let placedCount = 0;
  let leaderVerts = 0;
  for (let i = 0; i < labelPool.length; i++) {
    const entry = labelPool[i];
    const n = entry.nodeIndex >= 0 ? nodeData[entry.nodeIndex] : null;
    if (!n || !n.alive) { entry.sprite.visible = false; continue; }
    // Measure from the eye, not the rig: the camera sits EYE_HEIGHT above
    // rig.position, so using the rig put every label's distance and
    // line-of-sight test 1.6 units below the actual viewpoint, which let
    // occluded labels slip through near a large sphere. (LOD below still uses
    // the rig — its threshold is tuned against that.)
    const dist = _labelCamPos.distanceTo(n.pos);
    if (labelOccluded(n, _labelCamPos)) { entry.sprite.visible = false; continue; }

    // On-screen label height is proportional to distMul/dist, so the dist/24
    // term holds it constant as you move. The old 0.85 floor kicked in below
    // ~20 units and stopped that compensation, blowing a close-up word up to
    // ~170px and clipping it off both screen edges. The 2.2 cap did the mirror
    // thing past ~53 units, shrinking distant words to ~12px — the unreadable
    // micro-text seen deep in the mesh. Widen both ends so height stays
    // constant right out to the fog line, where opacity fades it out anyway.
    const distMul = Math.min(4.5, Math.max(0.10, dist / 24)) * labelSizeBoost;
    // Near fade used to be a fixed 2..6 band, tuned when every node was small.
    // A big node's surface already reaches ~1.1 world units, so flying up to it
    // put the camera inside the fade band and the word dissolved exactly when
    // you wanted to read it. Fade relative to the node's own radius instead.
    const nodeR = n.scale * 0.55; // matches the instance scale in refreshInstances()
    const nearIn = nodeR * 1.25, nearOut = nearIn + 1.2;
    const distOpacity = smoothstep01(nearIn, nearOut, dist) * (1 - smoothstep01(85, 120, dist));
    if (distOpacity <= 0.01) { entry.sprite.visible = false; continue; }

    // Anchor the word above the sphere, but never so far above that it leaves
    // the frustum: at close range a fixed world-space offset subtends a huge
    // angle (a 2.94-unit offset at 3.4 units out is 41 deg, past the 31 deg
    // half-fov), which is the other half of "the word doesn't come above it".
    _labelOffset.set(0, Math.max(nodeR * 1.15, Math.min(1.25 * n.scale + 0.5, dist * 0.32)), 0);
    _labelCenter.copy(n.pos).add(_labelOffset);
    _projB.copy(_labelCenter).project(camera);
    if (_projB.z > 1) { entry.sprite.visible = false; continue; } // behind camera

    const box = _screenPos[i];
    box.x = (_projB.x * 0.5 + 0.5) * screenW;
    box.y = (1 - (_projB.y * 0.5 + 0.5)) * screenH;
    box.halfW = screenHalfExtent(_projB.x, _projB.y, _labelRight, entry.baseW * distMul * 0.5, screenW, screenH);
    box.halfH = screenHalfExtent(_projB.x, _projB.y, _labelUp, entry.baseH * distMul * 0.5, screenW, screenH);

    // overlap resolution: labelPool is already priority-ordered (hover/select
    // first, then descending vol24h) — hide this one if it collides with a
    // higher-priority label already placed this frame; it reappears on its
    // own once the camera moves enough to clear the overlap
    let hidden = false;
    for (let j = 0; j < placedCount; j++) {
      if (boxesOverlap(box, _screenPos[_placedIdx[j]])) { hidden = true; break; }
    }
    if (hidden) { entry.sprite.visible = false; continue; }
    _placedIdx[placedCount++] = i;

    entry.sprite.visible = true;
    entry.sprite.material.opacity = distOpacity;
    entry.sprite.scale.set(entry.baseW * distMul, entry.baseH * distMul, 1);
    entry.sprite.position.copy(_labelCenter);

    // leader line: node centre -> label anchor, node colour, low opacity
    leaderPositions[leaderVerts*6+0] = n.pos.x; leaderPositions[leaderVerts*6+1] = n.pos.y; leaderPositions[leaderVerts*6+2] = n.pos.z;
    leaderPositions[leaderVerts*6+3] = _labelCenter.x; leaderPositions[leaderVerts*6+4] = _labelCenter.y; leaderPositions[leaderVerts*6+5] = _labelCenter.z;
    leaderColors[leaderVerts*6+0] = n.baseColor.r; leaderColors[leaderVerts*6+1] = n.baseColor.g; leaderColors[leaderVerts*6+2] = n.baseColor.b;
    leaderColors[leaderVerts*6+3] = n.baseColor.r; leaderColors[leaderVerts*6+4] = n.baseColor.g; leaderColors[leaderVerts*6+5] = n.baseColor.b;
    leaderVerts++;
  }
  leaderGeo.setDrawRange(0, leaderVerts * 2);
  recomputeLineBounds(leaderGeo, leaderPositions, leaderVerts * 2);
  leaderGeo.attributes.position.needsUpdate = true;
  leaderGeo.attributes.color.needsUpdate = true;

  edgeRebuildAccum += dt;

  if (renderer.xr.isPresenting) {
    renderer.render(scene, camera);
  } else {
    composer.render();
  }
});

connectDataSource();
setInterval(erlangBeat, ERLANG_INTERVAL);
window.__wm = { scene, camera, renderer, nodeMesh, nodeData, rig, composer, edgeLines, THREE, source, dataMode, pulses, flareNodeReplay, onDataEvent, labelPool, leaderGeo, mouseNDC, get hoveredNodeIndex() { return hoveredNodeIndex; }, get selectedNodeIndex() { return selectedNodeIndex; }, get dragging() { return dragging; }, get pointerLocked() { return pointerLocked; }, get yaw() { return yaw; }, get pitch() { return pitch; }, get dragPointerId() { return dragPointerId; }, setYaw: (v) => { yaw = v; }, setJoyVec: (x, y) => { joyVec = { x, y }; }, panelMesh, panelLeaderGeo, statusChip, controllerRays, raycaster, selectFromRay, selectNode, get panelNodeIndex() { return panelNodeIndex; }, get panelHistory() { return panelHistory; }, badgeEl, connectDataSource, setConnectionState, get words() { return words; }, searchButtonMesh, searchGroup, searchPanelMesh, keyboardMesh, KEYBOARD_LAYOUT, toggleSearch, openSearch, closeSearch, pressKey, handleSelectRay, selectSearchResult, computeSearchMatches, get searchOpen() { return searchOpen; }, get searchQuery() { return searchQuery; }, get searchMatches() { return searchMatches; }, get teleportAnim() { return teleportAnim; }, addLiveToken, get nodeBySale() { return nodeBySale; } };
</script>
