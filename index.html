<!DOCTYPE html>
<html lang="en">

<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; padding: 0; overflow: hidden; background: #04060c; height: 100%; touch-action: manipulation; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  canvas#c { display: block; width: 100vw; height: 100dvh; touch-action: none; }

  #hud {
    position: fixed; inset: 0; pointer-events: none;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    z-index: 10;
  }
  #hud.in-xr { display: none; }

  .panel {
    position: absolute;
    color: #dfe8ff;
    text-shadow: 0 1px 3px rgba(0,0,0,.8);
  }

  #title-block { top: 14px; left: 16px; pointer-events: none; }
  #title-block h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  #title-block .sub { font-size: 11px; opacity: 0.65; margin-top: 2px; }

  #mock-badge {
    display: inline-block; margin-top: 6px;
    font-size: 10px; font-weight: 700; letter-spacing: 1px;

    border: 1px solid rgba(255, 176, 32, 0.45);

  #mock-badge.offline { background: rgba(255, 90, 90, 0.18); color: #ff6b6b; border-color: rgba(255, 90, 90, 0.45); }

    color: #cdd9ff; font-size: 11px; font-weight: 600; padding: 9px 13px; border-radius: 20px;

  .pill-btn.on { border-color: #7de0ff; color: #7de0ff; background: rgba(60,120,200,0.28); }

  #footer-link { font-size: 10px; opacity: 0.55; pointer-events: auto; }

  /* AR exit — lives OUTSIDE #hud (which is display:none in XR), so it's the

    touch-action: none;

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",

<script type="module">
import * as THREE from "three";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";
import { io } from "socket.io-client";

/* ============================================================
   DataSource interface (locked seam — CLAUDE.md decision 5)
   getSnapshot(): Promise<{tokens: [{word, price, volume24h}]}>
   subscribe(cb): live events {type:'buy'|'sell'|'tip', word, amount, ts} -> unsubscribe fn
   getReplay(days): Promise<event[]>
   ============================================================ */

function buildVocabulary(count) {
  const A = ["MOON","APE","DEGEN","HODL","PEPE","WAGMI","GM","CHAD","BASED","ANON","FREN","NGMI","REKT","FOMO",
    "DYOR","LAMBO","DIAMOND","PAPER","BULL","BEAR","WHALE","SHRIMP","NODE","MESH","PULSE","CHAIN","BLOCK","TOKEN",
    "COIN","VAULT","FORGE","NOVA","ECHO","FLUX","ORBIT","ZENITH","CIPHER","QUANTUM","NEON","PIXEL","GLITCH",
    "SIGNAL","BEACON","RELAY","SPARK","EMBER","FROST","STORM","TIDE","DUNE","CORAL","ONYX","JADE","IVORY","CORE",
    "EDGE","PEAK","VOID","RIFT","WAVE","GRIT","HALO","EPOCH","DRIFT","FABLE","OMEN","RUNE","SIGIL","TEMPO"];
  const B = ["AE","SUPERHERO","TRENDMINER","DAO","FI","SWAP","VERSE","LAND","WORLD","NET","LINK","HUB","LAB",
    "ZONE","GRID","FIELD","SPACE","PORT","GATE","CHAIN"];
  const words = new Set();
  for (const a of A) words.add(a);
  let bi = 0;
  outer: while (words.size < count) {
    for (const a of A) {
      const b = B[bi % B.length];
      words.add(`${a}${b}`);
      if (words.size >= count) break outer;
    }
    bi++;
    if (bi > B.length * 4) break;
  }
  return Array.from(words).slice(0, count);
}

const FULL_VOCAB = buildVocabulary(320);
const NODE_COUNT = 220;
// Fix 2 (cosmetic label declutter): max labels shown at rest, by vol24h —
// plus the hovered/selected node if it isn't already in that set.
const LABEL_TOP_K = 20;

function poissonDelay(meanMs) {
  return -Math.log(1 - Math.random()) * meanMs;
}

class MockSource {
  constructor(words) {
    this.words = words;
    this.state = new Map();
    for (const w of this.words) {
      this.state.set(w, {
        word: w,
        price: 0.002 + Math.random() * Math.random() * 4,
        volume24h: Math.random() * Math.random() * 50000,
      });
    }
  }

  async getSnapshot() {
    return { tokens: Array.from(this.state.values()).map((t) => ({ ...t })) };
  }

  subscribe(cb) {
    let alive = true;
    const tick = () => {
      if (!alive) return;
      const word = this.words[(Math.random() * this.words.length) | 0];
      const type = Math.random() < 0.72 ? "buy" : "sell";
      const amount = Math.round((5 + Math.random() * Math.random() * 500));
      const st = this.state.get(word);
      if (st) {
        st.volume24h += amount;
        st.price = Math.max(0.0005, st.price * (type === "buy" ? 1 + Math.random() * 0.04 : 1 - Math.random() * 0.03));
      }
      cb({ type, word, amount, ts: Date.now() });
      setTimeout(tick, poissonDelay(1400));
    };
    setTimeout(tick, poissonDelay(1400));
    return () => { alive = false; };
  }

  async getReplay(days = 7) {
    const events = [];
    const n = Math.round(days * 40);
    const now = Date.now();
    for (let i = 0; i < n; i++) {
      const word = this.words[(Math.random() * this.words.length) | 0];
      events.push({
        type: Math.random() < 0.7 ? "buy" : "sell",
        word,
        amount: Math.round(5 + Math.random() * 300),
        ts: now - Math.random() * days * 86400000,
      });
    }
    return events.sort((a, b) => a.ts - b.ts);
  }
}

/* ============================================================
   SuperheroSource — real Trendminer data (Phase 1)
   Probed 2026-07-06, all CORS-open (Access-Control-Allow-Origin: *):
     REST  https://api.superhero.com/api/tokens (trending list, price)
     REST  https://api.superhero.com/api/transactions (buy/sell history)
     WS    https://api.superhero.com (Socket.IO — token-transaction events)
   No backend proxy needed. See CLAUDE.md Status log.
   ============================================================ */
const SUPERHERO_API = "https://api.superhero.com";
// Token set (2026-07-10 decision, see CLAUDE.md): the curated trending ~51 PLUS
// every token created inside this rolling window (covers "new since Monday" and
// keeps working as time passes). Full "all alive tokens" (~3,900) was rejected —
// too many spheres for Quest/mobile and needs paging all 54k. New tokens created
// mid-session are detected by polling and spark in live.
const NEW_TOKEN_WINDOW_MS = 7 * 24 * 3600 * 1000; // 7 days
const NEW_TOKEN_POLL_MS = 45000;                  // created_at poll cadence

function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error(`${label} timed out after ${ms}ms`)), ms)),
  ]);
}

function wordFromToken(t) {
  return (t.symbol || t.name || t.sale_address || "").toUpperCase().replace(/[^A-Z0-9-]/g, "");
}

class SuperheroSource {
  constructor(nodeCount) {
    this.nodeCount = nodeCount;
    this.bySaleAddr = new Map(); // sale_address -> word, for WS event -> node lookup
  }

  // one place that turns a raw /api/tokens record into our node token shape.
  // bonding-curve prices are fractions of an AE cent — too flat to size nodes
  // by visually, so market cap (price*supply, real and live-updating) drives
  // size; trending_score drives brightness (no 24h-volume field on this API).
  _mapToken(t) {
    const word = wordFromToken(t);
    this.bySaleAddr.set(t.sale_address, word);
    const decimals = Number(t.decimals) || 18;
    return {
      word,
      price: parseFloat(t.price_data?.ae ?? t.price) || 0,
      volume24h: Math.max(0, parseFloat(t.trending_score) || 0) * 1e5,
      marketCap: (parseFloat(t.market_cap) || 0) / 10 ** decimals,
      holders: t.holders_count,
      saleAddress: t.sale_address,
      createdAt: Date.parse(t.created_at || 0) || 0,
    };
  }

  async _fetchList(query) {
    const res = await withTimeout(fetch(`${SUPERHERO_API}/api/tokens?${query}`), 8000, "tokens");
    if (!res.ok) throw new Error(`tokens fetch failed: ${res.status}`);
    return ((await res.json()).items || []);
  }

  // Snapshot = the curated trending set (what the API surfaces) MERGED with
  // every token created inside NEW_TOKEN_WINDOW. `order_by=trending_score`
  // returns a fixed ~51 that excludes freshly-created tokens entirely (a new
  // token like DWEBCAMP never enters it), so recent creations are fetched
  // separately by created_at and unioned in — that's how new tokens show at all.
  async getSnapshot() {
    const trending = await this._fetchList(`order_by=trending_score&order_direction=DESC&limit=100&page=1`);
    let recent = [];
    try { recent = await this._fetchList(`order_by=created_at&order_direction=DESC&limit=100&page=1`); }
    catch (e) { console.warn("[WordMesh] recent-tokens fetch failed, trending only:", e.message); }
    const cutoff = Date.now() - NEW_TOKEN_WINDOW_MS;
    const seen = new Set(trending.map((t) => t.sale_address));
    const merged = trending.slice();
    for (const t of recent) {
      if (seen.has(t.sale_address)) continue;
      if ((Date.parse(t.created_at || 0) || 0) < cutoff) continue; // only genuinely-recent
      seen.add(t.sale_address);
      merged.push(t);
    }
    return { tokens: merged.map((t) => this._mapToken(t)) };
  }

  // Poll source for live new-token detection: newest tokens by creation.
  async getRecentTokens() {
    const items = await this._fetchList(`order_by=created_at&order_direction=DESC&limit=100&page=1`);
    return items.map((t) => this._mapToken(t));
  }

  subscribe(cb) {
    let alive = true;
    const socket = io(SUPERHERO_API, { transports: ["websocket", "polling"] });
    this.socket = socket; // exposed for verification only
    socket.on("connect", () => console.info("[WordMesh] live WS connected:", socket.id));
    socket.on("token-transaction", (payload) => {
      if (!alive) return;
      if (payload.tx_type !== "buy" && payload.tx_type !== "sell") return;
      const saleAddr = payload.sale_address || payload.token?.sale_address;
      const word = this.bySaleAddr.get(saleAddr) || (payload.token ? wordFromToken(payload.token) : null);
      if (!word) return;
      cb({
        type: payload.tx_type,
        word,
        saleAddress: saleAddr,
        amount: parseFloat(payload.amount?.ae ?? payload.amount) || 1,
        ts: Date.now(),
      });
    });
    socket.on("connect_error", (err) => console.warn("[WordMesh] live WS connect error:", err.message));
    return () => { alive = false; socket.disconnect(); };
  }

  async getReplay(days = 7) {
    const events = [];
    const cutoff = Date.now() - days * 86400000;
    for (let page = 1; page <= 6; page++) {
      const res = await withTimeout(
        fetch(`${SUPERHERO_API}/api/transactions?includes=token&limit=100&page=${page}`),
        8000, "getReplay"
      );
      if (!res.ok) break;
      const body = await res.json();
      const items = body.items || [];
      if (items.length === 0) break;
      let pastCutoff = false;
      for (const tx of items) {
        if (tx.tx_type !== "buy" && tx.tx_type !== "sell") continue;
        const ts = new Date(tx.created_at).getTime();
        if (ts < cutoff) { pastCutoff = true; continue; }
        events.push({
          type: tx.tx_type,
          word: wordFromToken(tx.token || {}),
          saleAddress: tx.token?.sale_address || tx.sale_address,
          amount: parseFloat(tx.amount?.ae ?? tx.amount) || 1,
          ts,
        });
      }
      if (pastCutoff) break;
    }
    return events.sort((a, b) => a.ts - b.ts);
  }

  // In-scene panel sparkline (live mode only): per-token hourly OHLC
  // candles. Probed 2026-07-09 — generic query params on /api/transactions
  // (sale_address=, token_address=) are silently ignored and just return
  // the unfiltered global feed; this dedicated per-address endpoint is the
  // real per-token source, confirmed against two different tokens (correct
  // `symbol` echoed back in each response), CORS-open. Returns null on any
  // failure/empty result so the panel can omit the sparkline gracefully —
  // callers must never fabricate a series from this.
  async getTokenHistory(saleAddress, hours = 48) {
    try {
      const res = await withTimeout(
        fetch(`${SUPERHERO_API}/api/tokens/${saleAddress}/transactions?limit=${hours}`),
        8000, "getTokenHistory"
      );
      if (!res.ok) return null;
      const body = await res.json();
      if (!Array.isArray(body) || body.length === 0) return null;
      const points = body
        .map((c) => ({ ts: new Date(c.quote?.timestamp || c.timeClose).getTime(), price: parseFloat(c.quote?.close) || 0 }))
        .filter((p) => p.price > 0 && Number.isFinite(p.ts))
        .sort((a, b) => a.ts - b.ts);
      return points.length > 1 ? points : null;
    } catch {
      return null;
    }
  }
}

// Live is the default experience — no query param needed. Mock only
// exists as a hidden ?data=mock dev fallback (never the default, never
// surfaced in any UI control). Nothing here blocks on a network fetch —
// source/words are just declared; the actual connection (with retry and
// honest connecting/live/offline badge states) happens in
// connectDataSource(), called after the scene is fully set up, so the
// renderer/starfield/HUD render immediately regardless of connection state.
const params = new URLSearchParams(location.search);
const dataMode = params.get("data") === "mock" ? "mock" : "live";
const badgeEl = document.getElementById("mock-badge");
let source;
let words = [];
if (dataMode === "mock") {
  words = FULL_VOCAB.slice(0, NODE_COUNT);
  source = new MockSource(words);
  badgeEl.textContent = "MOCK DATA";
} else {
  source = new SuperheroSource(NODE_COUNT);
  badgeEl.textContent = "CONNECTING…";
  badgeEl.classList.add("connecting");
}

/* ============================================================
   Renderer / scene / camera rig
   ============================================================ */

const canvas = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance", preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.xr.enabled = true;
// room-scale floor-relative tracking (webxr-threejs standard) — without this
// Three.js defaults to a 'local' reference space, whose origin can be an
// arbitrary head-height point at session start rather than the real floor.
renderer.xr.setReferenceSpaceType("local-floor");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x030509);
scene.fog = new THREE.FogExp2(0x030509, 0.0085);

const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.05, 800);
const EYE_HEIGHT = 1.6;
camera.position.set(0, 0, 0);

const rig = new THREE.Group();
rig.position.set(0, 0, 24);
rig.add(camera);
scene.add(rig);

function applyFlatEyeHeight() {
  if (!renderer.xr.isPresenting) camera.position.y = EYE_HEIGHT;
}
applyFlatEyeHeight();

// Fix 3: key + fill tuned so lit instanced spheres actually show a
// light-side/dark-side gradient — a stronger key relative to the fill
// (rather than a weak, near-shadowless rig) is what makes a sphere read as
// a sphere instead of a flat emissive blob. Kept subtle against the black
// background per threejs-visual-polish guidance — this is fill light, the
// glow is still carried by emissive + bloom.
const hemi = new THREE.HemisphereLight(0x8fb8ff, 0x0a0812, 0.32);
scene.add(hemi);
const dirLight = new THREE.DirectionalLight(0xbcd4ff, 0.45);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

/* ---- starfield backdrop (round, varied — threejs-visual-polish) ---- */
function makeCircleTexture() {
  const size = 64;
  const cnv = document.createElement("canvas");
  cnv.width = cnv.height = size;
  const ctx = cnv.getContext("2d");
  const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0, "rgba(255,255,255,1)");
  g.addColorStop(0.4, "rgba(255,255,255,0.7)");
  g.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
const circleTex = makeCircleTexture();

function buildStarfield() {
  const STAR_COUNT = 1400;
  const positions = new Float32Array(STAR_COUNT * 3);
  const colors = new Float32Array(STAR_COUNT * 3);
  const sizes = new Float32Array(STAR_COUNT);
  const color = new THREE.Color();
  for (let i = 0; i < STAR_COUNT; i++) {
    const r = 260 + Math.random() * 140;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);

  const dists = [];
  for (const n of nodeData) {
    if (n.index === i || !n.alive) continue;
    dists.push([n.index, src.pos.distanceToSquared(n.pos)]);
  }
  dists.sort((a, b) => a[1] - b[1]);
  return dists.slice(0, k).map((d) => d[0]);
}

function buildEdges() {
  adjacency = nodeData.map(() => new Set());
  for (const n of nodeData) {
    if (!n.alive) continue;
    const k = 2 + ((n.index % 3) === 0 ? 1 : 0);
    for (const j of nearestNeighbors(n.index, k)) {
      adjacency[n.index].add(j);
      adjacency[j].add(n.index);
    }
  }
  writeEdgeBuffer();
}

function writeEdgeBuffer() {
  let vi = 0;
  const seen = new Set();
  outer: for (let i = 0; i < adjacency.length; i++) {
    for (const j of adjacency[i]) {
      const key = i < j ? `${i}_${j}` : `${j}_${i}`;
      if (seen.has(key)) continue;
      seen.add(key);
      if (vi >= MAX_EDGES) break outer;
      const a = nodeData[i], b = nodeData[j];
      edgePositions[vi*6+0] = a.pos.x; edgePositions[vi*6+1] = a.pos.y; edgePositions[vi*6+2] = a.pos.z;
      edgePositions[vi*6+3] = b.pos.x; edgePositions[vi*6+4] = b.pos.y; edgePositions[vi*6+5] = b.pos.z;
      const c1 = a.baseColor, c2 = b.baseColor;
      edgeColors[vi*6+0]=c1.r; edgeColors[vi*6+1]=c1.g; edgeColors[vi*6+2]=c1.b;
      edgeColors[vi*6+3]=c2.r; edgeColors[vi*6+4]=c2.g; edgeColors[vi*6+5]=c2.b;
      vi++;
    }
  }
  edgeGeo.setDrawRange(0, vi * 2);
  recomputeLineBounds(edgeGeo, edgePositions, vi * 2);
  edgeGeo.attributes.position.needsUpdate = true;
  edgeGeo.attributes.color.needsUpdate = true;
  edgeLines.userData.edgeList = Array.from(seen).map((k) => k.split("_").map(Number));
}

/* ============================================================
   Pulses — light traveling down an edge (shader/uv anim, pooled)
   ============================================================ */
const MAX_PULSES = 48;
const pulseGeo = new THREE.SphereGeometry(1, 6, 6);
const pulseMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending });
const pulseMesh = new THREE.InstancedMesh(pulseGeo, pulseMat, MAX_PULSES);
pulseMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
// pulses are parked hidden until a trade fires, so they bake the same
// degenerate bounding sphere and never render in live mode (see nodeMesh)
pulseMesh.frustumCulled = false;
scene.add(pulseMesh);
const pulses = []; // {from, to, t, speed, color, replay}
for (let i = 0; i < MAX_PULSES; i++) pulses.push({ active: false });
const _pv = new THREE.Vector3();

function spawnPulse(fromIdx, toIdx, color, replay = false) {
  const slot = pulses.find((p) => !p.active);
  if (!slot) return;
  slot.active = true;
  slot.from = fromIdx; slot.to = toIdx; slot.t = 0;
  slot.speed = replay ? 0.35 : 0.6 + Math.random() * 0.3;
  slot.color = color; slot.replay = replay;
}

function edgeTowardNode(targetIdx) {
  const neighbors = adjacency[targetIdx];
  if (!neighbors || neighbors.size === 0) return null;
  const arr = Array.from(neighbors).filter((j) => nodeData[j].alive);
  if (arr.length === 0) return null;
  return arr[(Math.random() * arr.length) | 0];
}

/* ============================================================
   Node flare + Erlang beat (die / reroute / respawn every ~60s)
   ============================================================ */
const usedWords = new Set(words);
const spareWords = FULL_VOCAB.filter((w) => !usedWords.has(w));

// resolve by sale_address first — two tokens can share a symbol, so a
// word lookup would flare whichever node happened to be built first
function nodeForEvent(word, saleAddress) {
  const bySale = saleAddress ? nodeBySale.get(saleAddress) : null;
  if (bySale && bySale.alive) return bySale;
  return nodeData.find((d) => d.word === word && d.alive) || null;
}
function flareNode(word, type, saleAddress) {
  const n = nodeForEvent(word, saleAddress);
  if (!n) return;
  n.flare = type === "sell" ? 0.35 : 0.9;
  const fromIdx = edgeTowardNode(n.index);
  if (fromIdx !== null) spawnPulse(fromIdx, n.index, n.baseColor.clone().lerp(new THREE.Color(0xffffff), 0.4), false);
  // A live trade flares the node in 3D only. It must NOT write any readout:
  // the selection panel is authoritative for the node the user picked, and a
  // trade on some OTHER token used to overwrite the shared DOM readout (a
  // different token, with a BUY/SELL prefix) — the "data changes on its own"
  // desync. Trade activity gets its own feed in a later phase.
}

function onDataEvent(evt) {
  if (evt.type === "buy" || evt.type === "sell") flareNode(evt.word, evt.type, evt.saleAddress);
}
source.subscribe(onDataEvent);

/* ---- Replay layer (CLAUDE.md decision 6): compress the last ~7 days of
   real trades into a short repeating loop so the room always breathes
   under the live feed's tiny real-time volume. Dimmer/cooler pulses, no
   node scale/flare beyond a faint nudge, no HUD update — kept visually
   and functionally distinct from genuine live buy/sell events. ---- */
function flareNodeReplay(word, saleAddress) {
  const n = nodeForEvent(word, saleAddress);
  if (!n) return;
  n.flare = Math.max(n.flare, 0.12);
  const fromIdx = edgeTowardNode(n.index);
  if (fromIdx === null) return;
  const cool = n.baseColor.clone().lerp(new THREE.Color(0x3a6fb0), 0.6).multiplyScalar(0.55);
  spawnPulse(fromIdx, n.index, cool, true);
}

const REPLAY_LOOP_MS = 90000; // ~7 real days compressed into 90s, looping
async function startReplayLoop() {
  if (dataMode !== "live") return;
  let events;
  try {
    events = await source.getReplay(7);
  } catch (err) {
    console.warn("[WordMesh] replay fetch failed:", err.message);
    return;
  }
  if (!events.length) return;
  const first = events[0].ts, last = events[events.length - 1].ts;
  const span = Math.max(1, last - first);
  const schedule = () => {
    for (const evt of events) {
      const delay = ((evt.ts - first) / span) * REPLAY_LOOP_MS;
      setTimeout(() => flareNodeReplay(evt.word, evt.saleAddress), delay);
    }
  };
  schedule();
  setInterval(schedule, REPLAY_LOOP_MS);
}
startReplayLoop();

const ERLANG_INTERVAL = 60000;
let erlangTimer = 0;
function erlangBeat() {
  const alive = nodeData.filter((n) => n.alive && !n.dying);
  if (alive.length === 0) return;
  const victim = alive[(Math.random() * alive.length) | 0];
  victim.dying = true;
  victim.dieT = 0;
}

function reviveSlot(n) {
  if (dataMode === "live") {
    // real token universe is small and fixed by symbol — respawn the same
    // real word rather than inventing a replacement one
  } else {
    const pool = spareWords.length ? spareWords : FULL_VOCAB;
    const newWord = pool[(Math.random() * pool.length) | 0];
    const idx = spareWords.indexOf(newWord);
    if (idx >= 0) spareWords.splice(idx, 1);
    n.word = newWord;
    n.displayName = newWord; // mock words are unique, so no disambiguation needed
    n.price = 0.002 + Math.random() * Math.random() * 4;
    n.volume24h = Math.random() * Math.random() * 50000;
  }
  const sizeMetric = n.marketCap != null ? n.marketCap : n.price;
  if (dataMode === "live") {
    n.scale = liveNormScale(sizeMetric, liveSizeRange, 0.35, 1.95);
    n.intensity = liveNormScale(n.volume24h, liveVolRange, 0.6, 3.0);
  } else {
    n.scale = priceToScale(sizeMetric);
    n.intensity = volumeToIntensity(n.volume24h);
  }
  const r = (14 + Math.random() * 46) * spawnDensityScale;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  n.pos.set(r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi) * 0.6, r * Math.sin(phi) * Math.sin(theta));
  n.baseColor = new THREE.Color().setHSL(Math.random(), 0.75, 0.55);
  writeEmissiveAttributes(n.index, n.baseColor);
  n.alive = true; n.dying = false; n.spawnT = 0;
  refreshNodeBounds(); // the node just moved — keep picking's broad-phase honest
}

/* ============================================================
   WebXR mode switcher (skill: enter/exit lifecycle, sessionend)
   ============================================================ */
const btnFlat = document.getElementById("btn-flat");
const btnVR = document.getElementById("btn-vr");
const btnAR = document.getElementById("btn-ar");
const hud = document.getElementById("hud");
let currentSession = null;

async function detectXRSupport() {
  if (!navigator.xr) return;
  try { if (await navigator.xr.isSessionSupported("immersive-vr")) btnVR.disabled = false; } catch {}
  try { if (await navigator.xr.isSessionSupported("immersive-ar")) btnAR.disabled = false; } catch {}
}
detectXRSupport();

const savedBackground = scene.background;
const savedFog = scene.fog;

async function enterXR(mode) {
  if (!navigator.xr) return;
  try {
    const session = await navigator.xr.requestSession(mode, {
      optionalFeatures: ["local-floor", "dom-overlay", "hit-test"],
      domOverlay: mode === "immersive-ar" ? { root: document.body } : undefined,
    });
    currentSession = session;
    // Reset the shared rig to the reference-space origin before presenting.
    // The mesh is already built centered at world (0,0,0) (initNodes spawns
    // every node in a sphere around the origin) — so this is what actually
    // puts the viewer inside it. rig.position accumulates freely while
    // flying in Screen mode, and since the SAME rig is reused across every
    // mode, entering AR without this reset dropped the viewer wherever
    // Screen-mode flight last left off — beside or outside the mesh
    // instead of embedded in it (reported as "the mesh sits off to the
    // left"). Applies to VR too, for the same reason.
    rig.position.set(0, 0, 0);
    rig.rotation.set(0, 0, 0);
    await renderer.xr.setSession(session);
    hud.classList.add("in-xr");
    applyStatusVisibility(); // chip takes over from the now-hidden DOM badge
    [btnFlat, btnVR, btnAR].forEach((b) => b.classList.remove("active"));
    (mode === "immersive-vr" ? btnVR : btnAR).classList.add("active");
    if (mode === "immersive-ar") {
      // AR passthrough is the environment — suppress the opaque backdrop/fog
      // shell entirely so the real world shows through (shell-off in AR).
      scene.background = null;
      scene.fog = null;
      // the whole #hud (incl. the Screen/exit mode-switcher) is display:none in
      // XR, so surface the standalone exit button in the AR dom-overlay
      btnExitXR.classList.add("show");
    }
    session.addEventListener("end", onXRSessionEnd);
  } catch (err) {
    console.warn("[WordMesh] XR session request failed:", err);
  }
}
function onXRSessionEnd() {
  currentSession = null;
  hud.classList.remove("in-xr");
  btnExitXR.classList.remove("show");
  applyStatusVisibility(); // back to screen mode: chip off, badge only if noteworthy
  [btnFlat, btnVR, btnAR].forEach((b) => b.classList.remove("active"));
  btnFlat.classList.add("active");
  scene.background = savedBackground;
  scene.fog = savedFog;
  applyFlatEyeHeight();
}
renderer.xr.addEventListener("sessionend", onXRSessionEnd);

btnFlat.addEventListener("click", () => { if (currentSession) currentSession.end(); });
btnVR.addEventListener("click", () => enterXR("immersive-vr"));
btnAR.addEventListener("click", () => enterXR("immersive-ar"));
const btnExitXR = document.getElementById("btn-exit-xr");
btnExitXR.addEventListener("click", () => { if (currentSession) currentSession.end(); });

/* ============================================================
   Locomotion — desktop / mobile / VR (unified fly-by-default)
   ============================================================ */
// Touch-capable device? The old `(pointer: coarse) and (not (pointer: fine))`
// query hid the joystick + vertical buttons on Android phones that ALSO report
// a fine pointer (stylus/S-Pen support, a paired mouse, or Chrome's pointer
// heuristics) — those users could look (drag isn't gated) but could never
// move. maxTouchPoints is the reliable "has touch" signal; keep coarse as a
// fallback for touch devices that under-report it. Desktop (0 touch points,
// fine-only) stays false, so mouse-fly / WASD is unchanged.
const isCoarsePointer = (navigator.maxTouchPoints || 0) > 0 || matchMedia("(pointer: coarse)").matches;
let flyMode = true;
const btnFly = document.getElementById("btn-fly");
btnFly.addEventListener("click", () => {
  flyMode = !flyMode;
  btnFly.textContent = `Fly: ${flyMode ? "ON" : "OFF"}`;
  btnFly.classList.toggle("on", flyMode);
});

const keys = new Set();
window.addEventListener("keydown", (e) => {
  keys.add(e.code);
  if (e.code === "KeyF") btnFly.click();
  // Space/Ctrl drive vertical fly — stop Space from scrolling the page or
  // re-clicking whatever HUD button last had focus
  if (e.code === "Space" || e.code === "ControlLeft" || e.code === "ControlRight") e.preventDefault();
});
window.addEventListener("keyup", (e) => keys.delete(e.code));

// hold-drag look (desktop) — a plain click stays free to interact.
// Pointer-id scoped: on mobile a second finger (the movement joystick) is
// a separate, simultaneous touch stream. window-level pointermove/pointerup
// fire for EVERY active pointer regardless of which element captured its
// pointerdown, so without filtering by id, the joystick thumb's own moves
// were leaking into yaw/pitch (or ending the drag early) during natural
// two-thumb play — corrupting the camera direction the joystick's
// movement is relative to, which is what read as "crooked" movement.
let dragging = false, dragPointerId = null, lastX = 0, lastY = 0;
let yaw = 0, pitch = 0;
canvas.addEventListener("pointerdown", (e) => {
  if (dragging) return; // a drag is already in progress on another pointer
  dragging = true; dragPointerId = e.pointerId; lastX = e.clientX; lastY = e.clientY;
});
function endDrag(e) {
  if (e.pointerId !== dragPointerId) return;
  dragging = false; dragPointerId = null;
}
window.addEventListener("pointerup", endDrag);
window.addEventListener("pointercancel", endDrag);
window.addEventListener("pointermove", (e) => {
  if (pointerLocked) {
    yaw -= e.movementX * 0.0022;
    pitch -= e.movementY * 0.0022;
    pitch = Math.max(-1.4, Math.min(1.4, pitch));
    return;
  }
  if (!dragging || e.pointerId !== dragPointerId) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  yaw -= dx * 0.0035;
  pitch -= dy * 0.0035;
  pitch = Math.max(-1.4, Math.min(1.4, pitch));
});

// Node selection — unified across every input modality. Mouse/tap set the
// ray from screen coords + camera (this also covers handheld AR: Three.js's
// XR manager keeps `camera` updated to the tracked device pose during a
// session, so setFromCamera works unchanged there, no separate AR-tap code
// needed). VR/AR controller trigger sets the ray directly from the
// controller's own pose (see pollVRSelection, further down). Every input
// funnels into the SAME raycaster + selectFromRay() — one selection path,
// one piece of state (selectedNodeIndex), feeding the in-scene detail panel
// (the single authoritative readout — there is no separate DOM readout).
const raycaster = new THREE.Raycaster();
const mouseNDC = new THREE.Vector2(-2, -2); // starts off-screen
window.addEventListener("pointermove", (e) => {
  if (dragging || pointerLocked) return;
  mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
});
// Shared by direct node clicks AND search-result teleport arrival (Batch
// 2) — one selection path regardless of how a node was reached.
function selectNode(n) {
  selectedNodeIndex = n.index;
  openPanelFor(n); // the in-scene panel is the single authoritative readout
}
function selectFromRay() {
  const hit = raycaster.intersectObject(nodeMesh)[0];
  if (hit && hit.instanceId != null && nodeData[hit.instanceId] && nodeData[hit.instanceId].alive) {
    selectNode(nodeData[hit.instanceId]);
  } else if (selectedNodeIndex >= 0) {
    // selecting empty space closes the panel and clears the highlight
    selectedNodeIndex = -1;
    closePanel();
  }
}
canvas.addEventListener("pointerdown", (e) => {
  mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouseNDC, camera);
  handleSelectRay();
});

// free-look toggle: desktop -> pointer lock, mobile -> gyro
let pointerLocked = false;
const btnFreelook = document.getElementById("btn-freelook");
const escHint = document.getElementById("esc-hint");
let gyroEnabled = false;
// gyro drives yaw/pitch as a DELTA from wherever look was when enabled, not
// as an absolute compass/tilt reading — using the raw absolute angles snapped
// the view to an unrelated orientation the instant free-look was toggled on,
// and compass heading (alpha) drifts independently of how far you've turned.
let gyroBaseAlpha = null, gyroBaseBeta = null, gyroYawBase = 0, gyroPitchBase = 0;

btnFreelook.addEventListener("click", async () => {
  if (isCoarsePointer) {
    if (!gyroEnabled) {
      if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
        try {
          const res = await DeviceOrientationEvent.requestPermission();
          if (res !== "granted") return;
        } catch { return; }
      }
      gyroEnabled = true;
      gyroBaseAlpha = null; // next deviceorientation event just calibrates, no snap
      gyroBaseBeta = null;
      btnFreelook.textContent = "Free look: ON";
      btnFreelook.classList.add("on");
    } else {
      gyroEnabled = false;
      btnFreelook.textContent = "Free look: OFF";
      btnFreelook.classList.remove("on");
    }
  } else {
    if (!pointerLocked) canvas.requestPointerLock();
    else document.exitPointerLock();
  }
});
document.addEventListener("pointerlockchange", () => {
  pointerLocked = document.pointerLockElement === canvas;
  btnFreelook.textContent = `Free look: ${pointerLocked ? "ON" : "OFF"}`;
  btnFreelook.classList.toggle("on", pointerLocked);
  escHint.classList.toggle("show", pointerLocked);
});

window.addEventListener("deviceorientation", (e) => {
  if (!gyroEnabled || e.alpha === null || e.beta === null) return;
  if (gyroBaseAlpha === null) {
    // first sample after enabling: record the baseline, don't move the view yet
    gyroBaseAlpha = e.alpha; gyroBaseBeta = e.beta;
    gyroYawBase = yaw; gyroPitchBase = pitch;
    return;
  }
  let dAlpha = e.alpha - gyroBaseAlpha;
  if (dAlpha > 180) dAlpha -= 360; // alpha wraps 0..360 (compass heading)
  if (dAlpha < -180) dAlpha += 360;
  const dBeta = e.beta - gyroBaseBeta;
  // alpha follows the right-hand rule about the world-up axis: turning the
  // phone right (clockwise seen from above) DECREASES alpha, and a rightward
  // turn must DECREASE yaw (yaw>0 turns the view left under the YXZ euler
  // below). The sign here was negated, so the view tracked the opposite way —
  // turn right, look left. Add dAlpha so a right turn (dAlpha<0) looks right.
  // (pitch was already correct: tilting the top away raises beta and looks up.)
  yaw = gyroYawBase + THREE.MathUtils.degToRad(dAlpha);
  pitch = Math.max(-1.4, Math.min(1.4, gyroPitchBase + THREE.MathUtils.degToRad(dBeta)));
});

// mobile on-screen joystick
const joyWrap = document.getElementById("joystick-wrap");
const joyBase = document.getElementById("joystick-base");
const joyNub = document.getElementById("joystick-nub");
let joyVec = { x: 0, y: 0 };
let mobileVertical = 0; // -1/0/1 from the on-screen ascend/descend buttons
if (isCoarsePointer) {
  joyWrap.classList.add("show");
  document.getElementById("controls-hint").textContent = "drag to look · joystick to fly";
  let joyActive = false, joyId = null, joyCenter = { x: 0, y: 0 };
  joyWrap.addEventListener("pointerdown", (e) => {
    if (joyActive) return; // already tracking another touch
    joyActive = true; joyId = e.pointerId;
    // recentre the stick base to the actual touchdown point (not the
    // widget's fixed geometric centre) — a thumb rarely lands dead-centre
    // on a small on-screen control, and using the fixed centre as the
    // zero-point biased every read off by however far the thumb missed it
    joyCenter = { x: e.clientX, y: e.clientY };
    joyBase.style.cssText = `position:fixed; left:${e.clientX - 55}px; top:${e.clientY - 55}px; right:auto; bottom:auto; width:110px; height:110px;`;
    joyNub.style.cssText = `position:fixed; left:${e.clientX - 22}px; top:${e.clientY - 22}px; right:auto; bottom:auto;`;
    e.stopPropagation();
  });
  window.addEventListener("pointermove", (e) => {
    if (!joyActive || e.pointerId !== joyId) return;
    let dx = e.clientX - joyCenter.x, dy = e.clientY - joyCenter.y;
    const max = 35;
    const len = Math.hypot(dx, dy);
    if (len > max) { dx = dx / len * max; dy = dy / len * max; }
    joyNub.style.left = `${joyCenter.x + dx - 22}px`;
    joyNub.style.top = `${joyCenter.y + dy - 22}px`;
    joyVec = { x: dx / max, y: dy / max };
  });
  function endJoy(e) {
    if (e.pointerId !== joyId) return;
    joyActive = false; joyVec = { x: 0, y: 0 };
    // dock back to the default (CSS-defined) idle position/appearance
    joyBase.style.cssText = "";
    joyNub.style.cssText = "";
  }
  window.addEventListener("pointerup", endJoy);
  window.addEventListener("pointercancel", endJoy);

  // dedicated vertical (ascend/descend) buttons — mobile has no clean way to
  // fly straight up/down otherwise, since pitch is tied to look direction
  const vertWrap = document.getElementById("vert-wrap");
  vertWrap.classList.add("show");
  const btnUp = document.getElementById("btn-up");
  const btnDown = document.getElementById("btn-down");
  const setVertical = (btn, v) => (e) => {
    e.stopPropagation();
    mobileVertical = v;
    btnUp.classList.toggle("active", v > 0);
    btnDown.classList.toggle("active", v < 0);
  };
  btnUp.addEventListener("pointerdown", setVertical(btnUp, 1));
  btnDown.addEventListener("pointerdown", setVertical(btnDown, -1));
  ["pointerup", "pointercancel", "pointerleave"].forEach((evt) => {
    btnUp.addEventListener(evt, setVertical(btnUp, 0));
    btnDown.addEventListener(evt, setVertical(btnDown, 0));
  });
}

// fade the controls hint after first input or a few seconds
const controlsHint = document.getElementById("controls-hint");
let hintHidden = false;
function hideHint() { if (!hintHidden) { hintHidden = true; controlsHint.classList.add("hidden"); } }
setTimeout(hideHint, 6000);
canvas.addEventListener("pointerdown", hideHint, { once: true });

/* ============================================================
   Billboard labels (cosmetic pass: auto-fit, tethered, decluttered)
   - one pooled sprite set, size LABEL_TOP_K + 1: top-K by vol24h, plus the
     hovered/selected node if it isn't already in that set (highest overlap
     priority — index 0 of `chosen`).
   - each label's canvas is sized exactly to its measured text (Fix 1: the
     pill can never be narrower than the text it holds); long tickers are
     capped and shown with a real ellipsis; the full name lives in the
     in-scene detail panel opened on select.
   - screen-space overlap is resolved every frame in priority order (higher
     vol24h / hover / select wins); a thin tether line + colour-matched dot
     + colour-tinted underline visually ties each label to its node.
   Sprite is always camera-facing (THREE.Sprite billboards by default).
   ============================================================ */
const LABEL_DPR = Math.min(window.devicePixelRatio || 1, 2);
const LABEL_FONT_PX = 34 * LABEL_DPR;
const LABEL_PAD_X = 22 * LABEL_DPR, LABEL_PAD_Y = 14 * LABEL_DPR;
const LABEL_DOT_R = 7 * LABEL_DPR, LABEL_DOT_GAP = 12 * LABEL_DPR;
const LABEL_WORLD_HEIGHT = 0.6; // fixed world-space height; width follows text via canvas aspect
// A phone shows the same viewport at a fraction of a desktop monitor's physical
// size, so labels sized to read well on desktop come out too small in the hand.
// Applied at render time (not baked into the label canvas) so it re-evaluates
// on resize/orientation change without repainting every sprite.
let labelSizeBoost = 1;
function updateLabelSizeBoost() {
  const vv = window.visualViewport;
  const w = vv ? vv.width : window.innerWidth;
  const h = vv ? vv.height : window.innerHeight;
  labelSizeBoost = w < h ? 1.7 : (w < 900 ? 1.4 : 1.15);
}
updateLabelSizeBoost();
const LABEL_MAX_CHARS = 12;
const LABEL_TRUNCATE_CHARS = 9; // "LITCHSUPERHERO" (14) -> "LITCHSUPE…"

function displayWord(word) {
  return word.length > LABEL_MAX_CHARS ? word.slice(0, LABEL_TRUNCATE_CHARS) + "…" : word;
}

const labelPool = [];
function makeLabelSprite() {
  const cnv = document.createElement("canvas");
  cnv.width = 4; cnv.height = 4; // real size set per-paint, once text is measured
  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  sprite.visible = false;
  scene.add(sprite);
  return { sprite, cnv, tex, texW: 0, texH: 0, lastWord: null, lastHex: null, nodeIndex: -1, baseW: 1, baseH: 1, textW: 0, dotSpace: 0 };
}
for (let i = 0; i < LABEL_TOP_K + 1; i++) labelPool.push(makeLabelSprite());

// Fix 1: canvas is sized exactly to the measured text (+ padding + dot),
// at devicePixelRatio, so the pill can never clip — then the sprite is
// scaled by the canvas's own aspect ratio, at a fixed world-space height.
// Fix 2: colour-matched dot + a colour-tinted underline strip tie the
// label to its node visually.
function paintLabelAutoFit(entry, word, hexColor) {
  const text = displayWord(word);
  const measureCtx = entry.cnv.getContext("2d");
  measureCtx.font = `700 ${LABEL_FONT_PX}px -apple-system, sans-serif`;
  const textW = measureCtx.measureText(text).width;
  const dotSpace = LABEL_DOT_R * 2 + LABEL_DOT_GAP;
  const w = Math.ceil(dotSpace + textW + LABEL_PAD_X * 2);
  const h = Math.ceil(LABEL_FONT_PX * 1.15 + LABEL_PAD_Y * 2);
  entry.cnv.width = w;
  entry.cnv.height = h; // resizing clears the canvas + resets context state
  const ctx = entry.cnv.getContext("2d");
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = "rgba(6,10,20,0.6)";
  ctx.beginPath();
  ctx.roundRect(0, 0, w, h, h / 2);
  ctx.fill();
  ctx.fillStyle = hexColor;
  ctx.beginPath();
  ctx.arc(LABEL_PAD_X * 0.5 + dotSpace / 2, h / 2, LABEL_DOT_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.font = `700 ${LABEL_FONT_PX}px -apple-system, sans-serif`;
  ctx.fillStyle = "#eaf6ff";
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  ctx.shadowColor = hexColor;
  ctx.shadowBlur = 7 * LABEL_DPR;
  const textX = LABEL_PAD_X * 0.5 + dotSpace;
  ctx.fillText(text, textX, h / 2 - LABEL_DPR);
  ctx.shadowBlur = 0;
  ctx.fillStyle = hexColor;
  ctx.globalAlpha = 0.85;
  ctx.fillRect(textX, h - LABEL_PAD_Y * 0.7, textW, Math.max(2, 2 * LABEL_DPR));
  ctx.globalAlpha = 1;
  // Resizing a canvas that already backs a GPU texture makes three re-upload
  // it via texSubImage2D against the OLD (smaller) storage — "glCopySubTexture:
  // Offset overflows texture dimensions", the upload is REJECTED, and the
  // sprite keeps its PREVIOUS glyphs even though it has already been rebound to
  // a new node. That is the doubled / detached / mashed-text seen during
  // movement: the near-label set rebinds every 350ms, each rebind refits the
  // text and resizes this canvas. (Measured: 3 of 5 texSubImage2D calls errored
  // from a canvas source; texImage2D never ran.) When the size changes, give
  // the canvas a FRESH texture so three does a full texImage2D allocation.
  if (w !== entry.texW || h !== entry.texH) {
    entry.tex.dispose();
    entry.tex = new THREE.CanvasTexture(entry.cnv);
    entry.tex.colorSpace = THREE.SRGBColorSpace;
    entry.sprite.material.map = entry.tex;
    entry.sprite.material.needsUpdate = true;
    entry.texW = w; entry.texH = h;
  } else {
    entry.tex.needsUpdate = true;
  }
  entry.lastWord = word;
  entry.lastHex = hexColor;
  const aspect = w / h;
  entry.baseW = LABEL_WORLD_HEIGHT * aspect;
  entry.baseH = LABEL_WORLD_HEIGHT;
}

function smoothstep01(edge0, edge1, x) {
  const t = Math.min(1, Math.max(0, (x - edge0) / (edge1 - edge0)));
  return t * t * (3 - 2 * t);
}

// Fix 2 declutter: hovered/selected node (set by the raycast hit-testing
// further down) always gets a label even if outside the top-K, and takes
// top overlap priority. selectedNodeIndex is also the in-scene detail
// panel's selection — sticky until explicitly closed (selecting empty
// space, or the node dying), not a timed flash like the old 4s expiry.
let hoveredNodeIndex = -1, selectedNodeIndex = -1;

const LABEL_RECOMPUTE_MS = 350;
const NEAR_LABEL_SLOTS = 6; // of labelPool.length, reserved for the closest nodes
const _labelCamPos = new THREE.Vector3();
let lastLabelRecompute = -Infinity;
function updateVisibleLabels(time) {
  if (time - lastLabelRecompute < LABEL_RECOMPUTE_MS) return;
  lastLabelRecompute = time;
  for (const n of nodeData) n.isTopWord = false;
  const alive = nodeData.filter((n) => n.alive);
  const ranked = [...alive].sort((a, b) => b.volume24h - a.volume24h);
  const extraIdx = selectedNodeIndex >= 0 ? selectedNodeIndex : hoveredNodeIndex;
  const extraNode = extraIdx >= 0 && nodeData[extraIdx] && nodeData[extraIdx].alive ? nodeData[extraIdx] : null;
  const chosen = [];
  const taken = new Set();
  const take = (n) => { if (!taken.has(n.index)) { taken.add(n.index); chosen.push(n); } };
  if (extraNode) take(extraNode);
  // Reserve slots for whatever you have flown up to. Ranking purely by
  // volume meant a low-volume token could fill half the viewport with no
  // word on it while a distant high-volume one stayed labelled — which
  // reads as a broken label, not as a ranking. Nearest-first also gives
  // these labels priority in the overlap pass below, since `chosen` is the
  // priority order.
  camera.getWorldPosition(_labelCamPos);
  const byDist = [...alive].sort(
    (a, b) => a.pos.distanceToSquared(_labelCamPos) - b.pos.distanceToSquared(_labelCamPos)
  );
  for (const n of byDist) {
    if (chosen.length >= NEAR_LABEL_SLOTS + (extraNode ? 1 : 0)) break;
    if (labelOccluded(n, _labelCamPos)) continue; // don't spend a near slot on a hidden node
    take(n);
  }
  for (const n of ranked) {
    if (chosen.length >= labelPool.length) break;
    take(n);
  }
  for (const n of chosen) n.isTopWord = true;
  for (let i = 0; i < labelPool.length; i++) {
    const entry = labelPool[i];
    const n = chosen[i];
    entry.nodeIndex = n ? n.index : -1;
    if (n) {
      const hex = "#" + n.baseColor.getHexString();
      if (entry.lastWord !== n.displayName || entry.lastHex !== hex) paintLabelAutoFit(entry, n.displayName, hex);
    }
  }
}

/* ---- leader lines: node centre -> label anchor, node colour, low opacity ---- */
const leaderGeo = new THREE.BufferGeometry();
const leaderPositions = new Float32Array(labelPool.length * 2 * 3);
const leaderColors = new Float32Array(labelPool.length * 2 * 3);
leaderGeo.setAttribute("position", new THREE.BufferAttribute(leaderPositions, 3));
leaderGeo.setAttribute("color", new THREE.BufferAttribute(leaderColors, 3));
leaderGeo.setDrawRange(0, 0);
const leaderMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.4, depthWrite: false });
const leaderLines = new THREE.LineSegments(leaderGeo, leaderMat);
scene.add(leaderLines);

// scratch objects reused every frame — no per-frame allocations
const _labelCenter = new THREE.Vector3();
const _labelRight = new THREE.Vector3();
const _labelUp = new THREE.Vector3();
const _projA = new THREE.Vector3();
const _projB = new THREE.Vector3();
const _screenPos = labelPool.map(() => ({ x: 0, y: 0, halfW: 0, halfH: 0 }));
const _placedIdx = new Int32Array(labelPool.length); // scratch: indices placed so far this frame

// perspective-correct screen-space half-extent (in pixels) of a world-space
// offset from _labelCenter along a (normalized) axis — projects centre and
// an offset point and measures the pixel delta. No per-call allocation.
function screenHalfExtent(centerNDCx, centerNDCy, axisVec, halfLenWorld, screenW, screenH) {
  _projA.copy(_labelCenter).addScaledVector(axisVec, halfLenWorld).project(camera);
  const dx = (_projA.x - centerNDCx) * 0.5 * screenW;
  const dy = (_projA.y - centerNDCy) * 0.5 * screenH;
  return Math.hypot(dx, dy);
}

function boxesOverlap(a, b) {
  return Math.abs(a.x - b.x) < (a.halfW + b.halfW) && Math.abs(a.y - b.y) < (a.halfH + b.halfH);
}

/* ============================================================
   In-scene detail panel — world-space, works in Screen/VR/AR alike, and is
   the SINGLE authoritative selection readout in every mode (there is no
   separate DOM readout; a former top-left one was removed because live trade
   events shared it and kept overwriting the selected token's data).
   Docked ~1.35m in front of the head on open, then world-locked: its
   POSITION doesn't chase the camera every frame (that would be nagging,
   not "docked"), only its ROTATION billboards around the vertical (Y)
   axis to keep facing the user as they move, per webxr-threejs billboard
   guidance. Re-centers fresh each time a new node is opened. Driven solely
   by selectedNodeIndex / panelNodeIndex.
   ============================================================ */
const PANEL_DPR = Math.min(window.devicePixelRatio || 1, 2);
const PANEL_W_PX = 480 * PANEL_DPR, PANEL_H_PX = 300 * PANEL_DPR;
const PANEL_WORLD_WIDTH = 0.5; // metres — real-world scale for XR legibility
const PANEL_WORLD_HEIGHT = PANEL_WORLD_WIDTH * (PANEL_H_PX / PANEL_W_PX);
const PANEL_DOCK_DIST = 1.35;
const PANEL_DOCK_DROP = 0.12; // slightly below eye level

const panelCanvas = document.createElement("canvas");
panelCanvas.width = PANEL_W_PX; panelCanvas.height = PANEL_H_PX;
const panelTex = new THREE.CanvasTexture(panelCanvas);
panelTex.colorSpace = THREE.SRGBColorSpace;
const panelMat = new THREE.MeshBasicMaterial({ map: panelTex, transparent: true, depthWrite: false, side: THREE.DoubleSide });
const panelMesh = new THREE.Mesh(new THREE.PlaneGeometry(PANEL_WORLD_WIDTH, PANEL_WORLD_HEIGHT), panelMat);
panelMesh.visible = false;
panelMesh.renderOrder = 10; // draw after nodes/pulses so it reads clearly on top
scene.add(panelMesh);

// leader line: panel -> node, in the node's own colour (same tether
// language as the label system), since the panel is docked away from it
const panelLeaderGeo = new THREE.BufferGeometry();
const panelLeaderPositions = new Float32Array(2 * 3);
const panelLeaderColors = new Float32Array(2 * 3);
panelLeaderGeo.setAttribute("position", new THREE.BufferAttribute(panelLeaderPositions, 3));
panelLeaderGeo.setAttribute("color", new THREE.BufferAttribute(panelLeaderColors, 3));
panelLeaderGeo.setDrawRange(0, 0);
const panelLeaderMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.5, depthWrite: false });
const panelLeaderLine = new THREE.LineSegments(panelLeaderGeo, panelLeaderMat);
scene.add(panelLeaderLine);

let panelNodeIndex = -1;
let panelHistory = null;          // sparkline points, live mode only — null means omit, never fabricate
let panelHistoryFetchedFor = null; // sale_address already requested, avoid refetching every repaint
let lastPanelRepaint = -Infinity;
const _headPosDock = new THREE.Vector3();
const _fwdDock = new THREE.Vector3();
const _lookTarget = new THREE.Vector3();

// Shared docked-billboard placement (Batch 2 reuses this for the search
// panel/keyboard group — same "head-anchored on open, world-locked,
// Y-billboard" pattern as the detail panel, not a second implementation).
function dockInFrontOfHead(obj, dist, drop) {
  camera.getWorldPosition(_headPosDock);
  camera.getWorldDirection(_fwdDock);
  _fwdDock.y = 0;
  if (_fwdDock.lengthSq() < 1e-6) _fwdDock.set(0, 0, -1); // edge case: looking straight up/down
  _fwdDock.normalize();
  obj.position.copy(_headPosDock).addScaledVector(_fwdDock, dist);
  obj.position.y -= drop;
}
function billboardYAxis(obj) {
  camera.getWorldPosition(_headPosDock);
  _lookTarget.set(_headPosDock.x, obj.position.y, _headPosDock.z);
  if (_lookTarget.distanceToSquared(obj.position) > 1e-8) obj.lookAt(_lookTarget);
}

function paintPanel(n) {
  const ctx = panelCanvas.getContext("2d");
  const w = panelCanvas.width, h = panelCanvas.height;
  const dpr = PANEL_DPR;
  ctx.clearRect(0, 0, w, h);
  const hex = "#" + n.baseColor.getHexString();
  ctx.fillStyle = "rgba(6,10,20,0.82)";
  ctx.beginPath();
  ctx.roundRect(0, 0, w, h, 18 * dpr);
  ctx.fill();
  ctx.strokeStyle = hex;
  ctx.lineWidth = 3 * dpr;
  ctx.beginPath();
  ctx.roundRect(1.5 * dpr, 1.5 * dpr, w - 3 * dpr, h - 3 * dpr, 18 * dpr);
  ctx.stroke();

  const pad = 24 * dpr;
  ctx.fillStyle = "#eaf6ff";
  ctx.font = `700 ${34 * dpr}px -apple-system, sans-serif`;
  ctx.textAlign = "left"; ctx.textBaseline = "top";
  ctx.fillText(n.displayName, pad, pad);
  ctx.fillStyle = hex;
  ctx.beginPath();
  ctx.arc(w - pad - 10 * dpr, pad + 17 * dpr, 10 * dpr, 0, Math.PI * 2);
  ctx.fill();

  ctx.font = `500 ${22 * dpr}px -apple-system, sans-serif`;
  ctx.fillStyle = "rgba(220,232,255,0.9)";
  ctx.fillText(`price ${n.price.toFixed(4)} AE`, pad, pad + 56 * dpr);
  ctx.fillText(`vol24h ${Math.round(n.volume24h)}`, pad, pad + 90 * dpr);

  // sparkline — live mode only, real per-token candle history (probed
  // 2026-07-09: /api/tokens/{address}/transactions is genuinely per-token).
  // Omitted entirely (not drawn) when unavailable — never a fabricated line.
  if (panelHistory && panelHistory.length > 1) {
    const gx = pad, gy = pad + 140 * dpr, gw = w - pad * 2, gh = 90 * dpr;
    const prices = panelHistory.map((p) => p.price);
    const lo = Math.min(...prices), hi = Math.max(...prices);
    const span = Math.max(1e-12, hi - lo);
    ctx.strokeStyle = hex; ctx.lineWidth = 2.5 * dpr;
    ctx.beginPath();
    panelHistory.forEach((p, i) => {
      const x = gx + (i / (panelHistory.length - 1)) * gw;
      const y = gy + gh - ((p.price - lo) / span) * gh;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.font = `400 ${15 * dpr}px -apple-system, sans-serif`;
    ctx.fillStyle = "rgba(160,180,220,0.7)";
    ctx.textBaseline = "alphabetic";
    ctx.fillText("48h", gx, gy + gh + 16 * dpr);
  }
  panelTex.needsUpdate = true;
}

function openPanelFor(n) {
  const isNewNode = panelNodeIndex !== n.index;
  panelNodeIndex = n.index;
  panelMesh.visible = true;
  paintPanel(n);
  if (isNewNode) {
    dockInFrontOfHead(panelMesh, PANEL_DOCK_DIST, PANEL_DOCK_DROP);

    panelHistory = null;
    if (dataMode === "live" && typeof source.getTokenHistory === "function" && n.saleAddress) {
      if (panelHistoryFetchedFor !== n.saleAddress) {
        const reqSale = n.saleAddress; // tag this fetch with its token identity
        panelHistoryFetchedFor = reqSale;
        source.getTokenHistory(reqSale).then((points) => {
          // Drop any response whose token is not the one currently selected.
          // Keyed on sale_address, not node index: sale_address is the unique
          // token id, and an out-of-order/late response for a token the user
          // has already clicked away from must never clobber the open panel.
          const cur = panelNodeIndex >= 0 ? nodeData[panelNodeIndex] : null;
          if (cur && cur.saleAddress === reqSale) {
            panelHistory = points;
            paintPanel(cur);
          }
        }).catch(() => {});
      }
    }
  }
}

function closePanel() {
  panelNodeIndex = -1;
  panelMesh.visible = false;
  panelLeaderGeo.setDrawRange(0, 0);
  panelHistory = null;
  panelHistoryFetchedFor = null;
}

// per-frame: billboard (Y-axis only, so the panel never tilts), refresh
// content periodically (price/vol tick live while open), update the
// leader line, and auto-close if the selected node died (Erlang beat)
function updatePanel(time) {
  if (panelNodeIndex < 0) return;
  const n = nodeData[panelNodeIndex];
  if (!n || !n.alive) { closePanel(); selectedNodeIndex = -1; return; }

  billboardYAxis(panelMesh);

  if (time - lastPanelRepaint > 400) {
    lastPanelRepaint = time;
    paintPanel(n);
  }

  panelLeaderPositions[0] = n.pos.x; panelLeaderPositions[1] = n.pos.y; panelLeaderPositions[2] = n.pos.z;
  panelLeaderPositions[3] = panelMesh.position.x; panelLeaderPositions[4] = panelMesh.position.y; panelLeaderPositions[5] = panelMesh.position.z;
  panelLeaderColors[0] = n.baseColor.r; panelLeaderColors[1] = n.baseColor.g; panelLeaderColors[2] = n.baseColor.b;
  panelLeaderColors[3] = n.baseColor.r; panelLeaderColors[4] = n.baseColor.g; panelLeaderColors[5] = n.baseColor.b;
  panelLeaderGeo.setDrawRange(0, 2);
  recomputeLineBounds(panelLeaderGeo, panelLeaderPositions, 2);
  panelLeaderGeo.attributes.position.needsUpdate = true;
  panelLeaderGeo.attributes.color.needsUpdate = true;
}

/* ============================================================
   In-scene status chip — mirrors the connection-state DOM badge
   (MOCK DATA / CONNECTING… / LIVE DATA / OFFLINE — RETRYING…).
   Parented directly to the camera (not the rig) so it's rigidly stuck in
   the corner of view in every mode, including inside a headset where the
   DOM badge is hidden. Repaintable — the connection state changes over a
   session (connecting -> live, or -> offline and retrying), unlike the
   old fixed mock-vs-live chip. Reuses the label system's auto-fit-canvas
   approach (measure text, size the canvas exactly to it, no clipping).
   ============================================================ */
const statusChipCanvas = document.createElement("canvas");
let statusChipTex = new THREE.CanvasTexture(statusChipCanvas);
let statusChipTexW = 0, statusChipTexH = 0;
statusChipTex.colorSpace = THREE.SRGBColorSpace;
const statusChipMat = new THREE.SpriteMaterial({ map: statusChipTex, transparent: true, depthTest: false, depthWrite: false });
const statusChip = new THREE.Sprite(statusChipMat);
statusChip.renderOrder = 20;
// sized/positioned conservatively so it stays fully in view even at a
// narrow (mobile-portrait) aspect ratio, not just a wide desktop one
statusChip.position.set(-0.05, -0.17, -0.5); // low, near-centre of view, always in frame
camera.add(statusChip);

function paintStatusChip(text, color) {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const measureCtx = statusChipCanvas.getContext("2d");
  measureCtx.font = `700 ${20 * dpr}px -apple-system, sans-serif`;
  const textW = measureCtx.measureText(text).width;
  const padX = 14 * dpr, padY = 8 * dpr;
  const w = Math.ceil(textW + padX * 2), h = Math.ceil(20 * dpr + padY * 2);
  statusChipCanvas.width = w; statusChipCanvas.height = h; // resizing clears + resets context state
  const ctx = statusChipCanvas.getContext("2d");
  ctx.fillStyle = "rgba(6,10,20,0.75)";
  ctx.beginPath(); ctx.roundRect(0, 0, w, h, h / 2); ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 2 * dpr;
  ctx.beginPath(); ctx.roundRect(1, 1, w - 2, h - 2, h / 2); ctx.stroke();
  ctx.fillStyle = color;
  ctx.font = `700 ${20 * dpr}px -apple-system, sans-serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(text, w / 2, h / 2 + 1);
  // Same resize-under-old-CanvasTexture trap fixed for node labels: the chip
  // canvas is re-sized to fit each state's text, and three re-uploads a resized
  // canvas via texSubImage2D against the old, smaller storage ("Offset overflows
  // texture dimensions") — the upload is rejected and the chip keeps stale
  // glyphs. Recreate the texture when the size changes so three re-allocates.
  if (w !== statusChipTexW || h !== statusChipTexH) {
    statusChipTex.dispose();
    statusChipTex = new THREE.CanvasTexture(statusChipCanvas);
    statusChipTex.colorSpace = THREE.SRGBColorSpace;
    statusChipMat.map = statusChipTex;
    statusChipMat.needsUpdate = true;
    statusChipTexW = w; statusChipTexH = h;
  } else {
    statusChipTex.needsUpdate = true;
  }
  const worldH = 0.03;
  statusChip.scale.set(worldH * (w / h), worldH, 1);
}

// Single source of truth for connection-state text/colour, shared by the
// DOM badge and the in-scene chip so they can never drift out of sync.
const CONNECTION_STATES = {
  mock: { text: "MOCK DATA", cls: "", color: "#ffb020" },
  connecting: { text: "CONNECTING…", cls: "connecting", color: "#9db6ff" },
  offline: { text: "OFFLINE — RETRYING…", cls: "offline", color: "#ff6b6b" },
  live: { text: "LIVE DATA", cls: "live", color: "#32dc8c" },
};
let connectionState = dataMode === "mock" ? "mock" : "connecting";
// Both indicators are suppressed once the mesh is actually live — that is the
// expected, uninteresting state and the user asked for the top badge and the
// in-view chip gone. Every other state still surfaces, so a failed or pending
// load never silently reads as an empty universe. The in-scene chip is the
// ONLY channel inside an immersive session (#hud.in-xr hides the DOM badge),
// so it exists solely for XR; in screen mode the DOM badge already covers it.
function applyStatusVisibility() {
  const noteworthy = connectionState !== "live";
  const inXR = !!currentSession;
  badgeEl.style.display = noteworthy && !inXR ? "" : "none";
  statusChip.visible = noteworthy && inXR;
}
function setConnectionState(state) {
  const cfg = CONNECTION_STATES[state];
  connectionState = state;
  badgeEl.classList.remove("connecting", "offline", "live");
  if (cfg.cls) badgeEl.classList.add(cfg.cls);
  badgeEl.textContent = cfg.text;
  paintStatusChip(cfg.text, cfg.color);
  applyStatusVisibility();
}
// sync the chip to whatever the DOM badge already shows from the
// top-level dataMode setup (that ran before the chip existed)
setConnectionState(dataMode === "mock" ? "mock" : "connecting");

/* ============================================================
   Search — in-scene button, docked panel + laser keyboard, live match
   list, teleport-on-select (Batch 2). Reuses the detail panel's docking
   pattern (dockInFrontOfHead/billboardYAxis) and the SAME raycaster +
   selectNode() as a direct node click — search-selecting a node is the
   exact same code path as clicking it, not a second one.
   ============================================================ */

// ---- search button: camera-attached, always reachable, all modes ----
const SEARCH_BTN_SIZE = 0.055;
const searchBtnCanvas = document.createElement("canvas");
searchBtnCanvas.width = 128; searchBtnCanvas.height = 128;
(function paintSearchBtnIcon() {
  const ctx = searchBtnCanvas.getContext("2d");
  ctx.clearRect(0, 0, 128, 128);
  ctx.fillStyle = "rgba(6,10,20,0.78)";
  ctx.beginPath(); ctx.arc(64, 64, 60, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "#9db6ff"; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(64, 64, 60, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = "#cdd9ff"; ctx.lineWidth = 7; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(56, 56, 20, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(71, 71); ctx.lineTo(88, 88); ctx.stroke();
})();
const searchBtnTex = new THREE.CanvasTexture(searchBtnCanvas);
searchBtnTex.colorSpace = THREE.SRGBColorSpace;
const searchButtonMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(SEARCH_BTN_SIZE, SEARCH_BTN_SIZE),
  new THREE.MeshBasicMaterial({ map: searchBtnTex, transparent: true, depthTest: false, depthWrite: false })
);
searchButtonMesh.renderOrder = 20;
camera.add(searchButtonMesh);
// A hardcoded x only fits a wide aspect: at 0.24 the button's right edge lands
// at 0.2675 while a portrait phone's viewport half-width at this plane is just
// ~0.198, so it hung off the screen edge and read as a clipped blob. Derive x
// from the actual frustum instead, and re-derive it on resize/rotation.
const SEARCH_BTN_Z = 0.5, SEARCH_BTN_MARGIN = 0.012;
// #vert-wrap (the ascend/descend fly column) is fixed at right:20px bottom:20px

// Static text labels are pooled sprites (letters never change, painted once).
const KEY_SIZE = 0.042, KEY_GAP = 0.007;

function buildKeyboardLayout() {
  const rows = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
  const keys = [];
  rows.forEach((row, rowIdx) => {
    const letters = row.split("");
    const rowWidth = letters.length * KEY_STEP;
    letters.forEach((letter, colIdx) => {
      keys.push({
        label: letter, action: "char", value: letter,
        x: -rowWidth / 2 + colIdx * KEY_STEP + KEY_STEP / 2,
        y: -rowIdx * KEY_STEP,
      });
    });
  });
  const controlRowIdx = rows.length;
  const controls = [
    { label: "⌫", action: "backspace" },
    { label: "CLR", action: "clear" },
    { label: "✕", action: "close" },
  ];
  const ctrlStep = KEY_STEP * 1.6;
  const ctrlRowWidth = controls.length * ctrlStep;
  controls.forEach((c, i) => {
    keys.push({ ...c, x: -ctrlRowWidth / 2 + i * ctrlStep + ctrlStep / 2, y: -controlRowIdx * KEY_STEP });
  });
  return keys;
}
const KEYBOARD_LAYOUT = buildKeyboardLayout();
const KEYBOARD_TOP_Y = -0.02; // local y of the keyboard's first row, below the panel

{

function makeKeyLabelSprite(text) {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const size = 48 * dpr;
  const cnv = document.createElement("canvas");
  cnv.width = size; cnv.height = size;
  const ctx = cnv.getContext("2d");
  ctx.font = `700 ${Math.round(size * 0.42)}px -apple-system, sans-serif`;
  ctx.fillStyle = "#eaf6ff";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(text, size / 2, size / 2 + 1);
  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  // depthTest:false is the fix for "the bottom of the letter looks greyed out":
  // the key boxes are semi-transparent (opacity 0.85) AND write depth, and this
  // billboarded label sits only KEY_SIZE*0.02 in front of a box face while being
  // KEY_SIZE*0.7 tall — so any view tilt swings the sprite's lower half behind
  // the box plane, where it failed the depth test and showed the dark box
  // through it. Not the label-canvas resize bug (these key canvases are a fixed
  // size, painted once); a genuine depth/transparency interaction. renderOrder
  // keeps the letters drawing after the boxes.
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false, depthWrite: false }));
  sprite.renderOrder = 3;
  const worldSize = KEY_SIZE * 0.7;
  sprite.scale.set(worldSize, worldSize, 1);
  return sprite;
}
KEYBOARD_LAYOUT.forEach((k) => {

// ---- search state + live match filtering ----
let searchOpen = false;
let searchQuery = "";
let searchMatches = [];
let searchMatchRects = []; // canvas-space hit rects for the match list, rebuilt every paint

function computeSearchMatches(query) {
  const q = query.trim().toUpperCase();
  if (!q) return [];
  const starts = [], contains = [];
  for (const n of nodeData) {
    if (!n.alive) continue;
    const word = n.word.toUpperCase();
    if (word.startsWith(q)) starts.push(n);
    else if (word.includes(q)) contains.push(n);
  }
  starts.sort((a, b) => a.word.length - b.word.length);
  contains.sort((a, b) => a.word.length - b.word.length);
  return [...starts, ...contains].slice(0, 6);
}

function paintSearchPanel() {
  const ctx = searchPanelCanvas.getContext("2d");
  const w = searchPanelCanvas.width, h = searchPanelCanvas.height;
  const dpr = SEARCH_PANEL_DPR;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = "rgba(6,10,20,0.9)";
  ctx.beginPath(); ctx.roundRect(0, 0, w, h, 16 * dpr); ctx.fill();
  ctx.strokeStyle = "rgba(157,182,255,0.6)"; ctx.lineWidth = 2 * dpr;
  ctx.beginPath(); ctx.roundRect(1, 1, w - 2, h - 2, 16 * dpr); ctx.stroke();

  const pad = 20 * dpr;
  ctx.font = `700 ${20 * dpr}px -apple-system, sans-serif`;
  ctx.fillStyle = "#eaf6ff";
  ctx.textAlign = "left"; ctx.textBaseline = "top";
  ctx.fillText("SEARCH", pad, pad);

  const qy = pad + 30 * dpr, qh = 34 * dpr;
  ctx.fillStyle = "rgba(255,255,255,0.06)";
  ctx.beginPath(); ctx.roundRect(pad, qy, w - pad * 2, qh, 8 * dpr); ctx.fill();
  ctx.strokeStyle = "rgba(157,182,255,0.4)"; ctx.lineWidth = 1.5 * dpr;
  ctx.beginPath(); ctx.roundRect(pad, qy, w - pad * 2, qh, 8 * dpr); ctx.stroke();
  ctx.font = `600 ${18 * dpr}px -apple-system, sans-serif`;
  ctx.fillStyle = "#7de0ff";
  ctx.textBaseline = "middle";
  ctx.fillText((searchQuery || "type on the keyboard below…") + (searchQuery ? "_" : ""), pad + 10 * dpr, qy + qh / 2 + 1);

  searchMatchRects = [];
  const listY = qy + qh + 12 * dpr;
  const rowH = 28 * dpr;
  if (searchQuery && searchMatches.length === 0) {
    ctx.font = `500 ${16 * dpr}px -apple-system, sans-serif`;
    ctx.fillStyle = "rgba(220,220,220,0.6)";
    ctx.textBaseline = "top";
    ctx.fillText("no token found", pad, listY);
  } else {
    searchMatches.forEach((n, i) => {
      const ry = listY + i * rowH;
      const rh = rowH - 4 * dpr;
      const hex = "#" + n.baseColor.getHexString();
      ctx.fillStyle = "rgba(255,255,255,0.04)";
      ctx.beginPath(); ctx.roundRect(pad, ry, w - pad * 2, rh, 6 * dpr); ctx.fill();
      ctx.fillStyle = hex;
      ctx.beginPath(); ctx.arc(pad + 12 * dpr, ry + rh / 2, 6 * dpr, 0, Math.PI * 2); ctx.fill();
      ctx.font = `600 ${16 * dpr}px -apple-system, sans-serif`;
      ctx.fillStyle = "#eaf6ff";
      ctx.textBaseline = "middle";
      ctx.fillText(n.displayName, pad + 26 * dpr, ry + rh / 2 + 1);
      searchMatchRects.push({ u0: pad / w, u1: (w - pad) / w, v0: ry / h, v1: (ry + rh) / h, node: n });
    });
  }
  searchPanelTex.needsUpdate = true;
}

// raycast hit.uv follows WebGL convention (v=1 at canvas-top, v=0 at
// canvas-bottom, i.e. flipped vs. how the canvas itself was painted) —
// flip it back before comparing against the paint-time rects
function matchRowAtUV(uv) {
  const canvasV = 1 - uv.y;
  for (const r of searchMatchRects) {
    if (uv.x >= r.u0 && uv.x <= r.u1 && canvasV >= r.v0 && canvasV <= r.v1) return r.node;
  }
  return null;
}

function openSearch() {
  if (searchOpen) return;
  searchOpen = true;
  selectedNodeIndex = -1;
  closePanel(); // don't show the detail panel and search UI at once
  searchQuery = "";
  searchMatches = [];
  dockInFrontOfHead(searchGroup, SEARCH_DOCK_DIST, SEARCH_DOCK_DROP);
  searchGroup.visible = true;
  paintSearchPanel();
}
function closeSearch() {
  searchOpen = false;
  searchGroup.visible = false;
}
function toggleSearch() {
  if (searchOpen) closeSearch(); else openSearch();
}
function pressKey(key) {
  if (key.action === "char") {
    if (searchQuery.length < 16) searchQuery += key.value;
  } else if (key.action === "backspace") {
    searchQuery = searchQuery.slice(0, -1);
  } else if (key.action === "clear") {
    searchQuery = "";
  } else if (key.action === "close") {
    closeSearch();
    return;
  }
  searchMatches = computeSearchMatches(searchQuery);
  paintSearchPanel();
}

// ---- teleport (quick-fly to a search result) ----
const TELEPORT_FRAMING_DIST = 8;
const TELEPORT_DURATION = 1.0;
let teleportAnim = null; // { from, to, t, node } — visible ease-in-out dolly
const _teleportDir = new THREE.Vector3();
function computeTeleportTarget(n) {
  // Full 3D: stop TELEPORT_FRAMING_DIST from the node along the line from the
  // node back toward wherever the camera currently is — so you approach from
  // your own side and arrive right in front of it, whether it's above, below,
  // or behind. (Previously y was zeroed and the height was locked to the
  // camera's, so a node far above/below left you at its horizontal position
  // but your original altitude — "flew to the area, not the node".)
  _teleportDir.subVectors(rig.position, n.pos);
  if (_teleportDir.lengthSq() < 1e-6) _teleportDir.set(0, 0, 1);
  _teleportDir.normalize();
  return n.pos.clone().addScaledVector(_teleportDir, TELEPORT_FRAMING_DIST);
}
// Yaw/pitch that make the YXZ-euler camera at `fromPos` look at `toPos`
// (matches camera.rotation.set(pitch, yaw, 0, "YXZ") in the flat branch).
function lookAnglesTo(fromPos, toPos) {
  const dx = toPos.x - fromPos.x, dy = toPos.y - fromPos.y, dz = toPos.z - fromPos.z;
  const len = Math.hypot(dx, dy, dz) || 1;
  const nx = dx / len, ny = dy / len, nz = dz / len;
  return {
    yaw: Math.atan2(-nx, -nz),
    pitch: Math.max(-1.4, Math.min(1.4, Math.asin(Math.max(-1, Math.min(1, ny))))),
  };
}
function selectSearchResult(n) {
  closeSearch();
  const target = computeTeleportTarget(n);
  const look = lookAnglesTo(target, n.pos);
  // shortest-path yaw so a node behind you turns the near way, not 350° around
  let toYaw = look.yaw;
  while (toYaw - yaw > Math.PI) toYaw -= 2 * Math.PI;
  while (toYaw - yaw < -Math.PI) toYaw += 2 * Math.PI;
  teleportAnim = {
    from: rig.position.clone(), to: target, t: 0, node: n,
    fromYaw: yaw, toYaw, fromPitch: pitch, toPitch: look.pitch,
  };
}

// ---- unified selection dispatch — search button/keyboard/match-list take
// priority over node selection when relevant, otherwise falls through to
// the existing selectFromRay() unchanged. Same raycaster throughout. ----
function handleSelectRay() {
  const btnHit = raycaster.intersectObject(searchButtonMesh)[0];
  if (btnHit) { toggleSearch(); return; }
  if (searchOpen) {
    const keyHit = raycaster.intersectObject(keyboardMesh)[0];
    if (keyHit && keyHit.instanceId != null) { pressKey(KEYBOARD_LAYOUT[keyHit.instanceId]); return; }
    const panelHit = raycaster.intersectObject(searchPanelMesh)[0];
    if (panelHit && panelHit.uv) {
      const match = matchRowAtUV(panelHit.uv);
      if (match) selectSearchResult(match);
      return; // hit the panel (row or background) — absorb the click either way
    }
    closeSearch(); // clicked away from all search UI — dismiss
    return;
  }
  selectFromRay();
}
